basePath: /
definitions:
  http.AccessErrorResponse:
    properties:
      error:
        type: string
    type: object
  http.AccessResponse:
    properties:
      bankCode:
        type: string
      bankId:
        type: integer
      bankName:
        type: string
      expiresAt:
        type: string
      grantReason:
        type: string
      grantedAt:
        type: string
      id:
        type: integer
      isActive:
        type: boolean
      revokeReason:
        type: string
      revokedAt:
        type: string
      userId:
        type: integer
    type: object
  http.AuthErrorResponse:
    properties:
      error:
        type: string
    type: object
  http.AuthResponse:
    properties:
      accessToken:
        type: string
      refreshToken:
        type: string
      user:
        $ref: '#/definitions/http.AuthUserResponse'
    type: object
  http.AuthUserResponse:
    properties:
      createdAt:
        type: string
      id:
        type: integer
      isActive:
        type: boolean
      login:
        type: string
      password:
        type: string
      role:
        type: string
      updatedAt:
        type: string
    type: object
  http.CreateUserRequest:
    properties:
      isActive:
        type: boolean
      login:
        type: string
      role:
        type: string
    required:
    - login
    - role
    type: object
  http.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  http.GrantAccessRequest:
    properties:
      bankId:
        type: integer
      expiresAt:
        type: string
      grantReason:
        type: string
      userId:
        type: integer
    required:
    - bankId
    - expiresAt
    - grantReason
    - userId
    type: object
  http.LoginRequest:
    properties:
      login:
        type: string
      password:
        type: string
    required:
    - login
    - password
    type: object
  http.LogoutRequest:
    properties:
      refreshToken:
        type: string
    required:
    - refreshToken
    type: object
  http.RefreshRequest:
    properties:
      refreshToken:
        type: string
    required:
    - refreshToken
    type: object
  http.RevokeAccessRequest:
    properties:
      bankId:
        type: integer
      revokeReason:
        type: string
      userId:
        type: integer
    required:
    - bankId
    - revokeReason
    - userId
    type: object
  http.UpdateUserRequest:
    properties:
      isActive:
        type: boolean
      login:
        type: string
      password:
        type: string
      role:
        type: string
    type: object
  http.UserResponse:
    properties:
      createdAt:
        type: string
      id:
        type: integer
      isActive:
        type: boolean
      login:
        type: string
      password:
        type: string
      role:
        type: string
      updatedAt:
        type: string
    type: object
  internal_modules_banks_beeline_transport_http.BeelineErrorResponse:
    properties:
      error:
        type: string
    type: object
  internal_modules_banks_beeline_transport_http.ConfigResponse:
    properties:
      balance:
        type: number
      createdAt:
        type: string
      incomingTotal:
        type: number
      number:
        type: string
      paymentsTotal:
        type: number
      updatedAt:
        type: string
    type: object
  internal_modules_banks_beeline_transport_http.CreatePaymentRequest:
    properties:
      amount:
        example: 13000
        type: number
      direction:
        enum:
        - outgoing
        - incoming
        example: outgoing
        type: string
      paidAt:
        example: "2026-05-23T12:07:47+03:00"
        type: string
      receiverCard:
        example: 220094**0028
        type: string
    required:
    - amount
    - paidAt
    type: object
  internal_modules_banks_beeline_transport_http.CreateSimRequest:
    properties:
      number:
        example: "9680659702"
        type: string
    required:
    - number
    type: object
  internal_modules_banks_beeline_transport_http.DetalizationResponse:
    properties:
      balance:
        type: number
      createdAt:
        type: string
      data:
        additionalProperties: {}
        type: object
      number:
        type: string
      periodEnd:
        type: string
      periodStart:
        type: string
      updatedAt:
        type: string
    type: object
  internal_modules_banks_beeline_transport_http.PaymentResponse:
    properties:
      amount:
        type: number
      commission:
        type: number
      createdAt:
        type: string
      direction:
        type: string
      id:
        type: string
      paidAt:
        type: string
      receiverCard:
        type: string
      simNumber:
        type: string
      source:
        type: string
      total:
        type: number
      updatedAt:
        type: string
    type: object
  internal_modules_banks_beeline_transport_http.SimResponse:
    properties:
      createdAt:
        type: string
      number:
        type: string
      updatedAt:
        type: string
    type: object
  internal_modules_banks_beeline_transport_http.UpdatePaymentRequest:
    properties:
      amount:
        example: 13000
        type: number
      direction:
        enum:
        - outgoing
        - incoming
        example: outgoing
        type: string
      paidAt:
        example: "2026-05-23T12:07:47+03:00"
        type: string
      receiverCard:
        example: 220094**0028
        type: string
    type: object
  internal_modules_banks_catalog_transport_http.BankErrorResponse:
    properties:
      error:
        type: string
    type: object
  internal_modules_banks_catalog_transport_http.BankResponse:
    properties:
      code:
        type: string
      createdAt:
        type: string
      id:
        type: integer
      name:
        type: string
      updatedAt:
        type: string
    type: object
  internal_modules_banks_rocketbank_transport_http.CardTransferRequest:
    properties:
      amount:
        example: 5000
        type: number
      balanceBefore:
        example: 22096.74
        type: number
      bankId:
        example: tbank
        type: string
      direction:
        enum:
        - OUTGOING
        - INCOMING
        example: OUTGOING
        type: string
      recipientCardNumber:
        example: 1234 5678 9100 0000
        type: string
      time:
        example: 2026-05-16T22:14:12+0700
        type: string
    required:
    - amount
    - balanceBefore
    - bankId
    - direction
    - recipientCardNumber
    - time
    type: object
  internal_modules_banks_rocketbank_transport_http.CashTransferRequest:
    properties:
      amount:
        example: 8000
        type: number
      balanceBefore:
        example: 22096.74
        type: number
      direction:
        enum:
        - OUTGOING
        - INCOMING
        example: OUTGOING
        type: string
      time:
        example: 2026-05-02T11:08:52+0700
        type: string
    required:
    - amount
    - balanceBefore
    - direction
    - time
    type: object
  internal_modules_banks_rocketbank_transport_http.ClientInfoResponse:
    properties:
      cardNumber:
        type: string
      firstName:
        type: string
      lastName:
        type: string
      middleName:
        type: string
      phoneNumber:
        type: string
    type: object
  internal_modules_banks_rocketbank_transport_http.ConfigResponse:
    properties:
      balance:
        type: number
      clientInfo:
        $ref: '#/definitions/internal_modules_banks_rocketbank_transport_http.ClientInfoResponse'
      createdAt:
        type: string
      history:
        items:
          $ref: '#/definitions/internal_modules_banks_rocketbank_transport_http.HistoryResponse'
        type: array
      updatedAt:
        type: string
    type: object
  internal_modules_banks_rocketbank_transport_http.HistoryResponse:
    properties:
      amount:
        type: number
      balanceBefore:
        type: number
      bankId:
        type: string
      direction:
        type: string
      id:
        type: string
      operationFirstName:
        type: string
      operationLastName:
        type: string
      operationMiddleName:
        type: string
      phoneNumber:
        type: string
      recipientCardNumber:
        type: string
      time:
        type: string
      type:
        type: string
    type: object
  internal_modules_banks_rocketbank_transport_http.RocketbankErrorResponse:
    properties:
      error:
        type: string
    type: object
  internal_modules_banks_rocketbank_transport_http.SBPTransferRequest:
    properties:
      amount:
        example: 50
        type: number
      balanceBefore:
        example: 190
        type: number
      bankId:
        example: tbank
        type: string
      direction:
        enum:
        - OUTGOING
        - INCOMING
        example: OUTGOING
        type: string
      operationFirstName:
        example: Азат
        type: string
      operationLastName:
        example: Гайнутдинов
        type: string
      operationMiddleName:
        example: Аликович
        type: string
      phoneNumber:
        example: "+79099334005"
        type: string
      time:
        example: 2026-05-16T22:14:12+0700
        type: string
    required:
    - amount
    - balanceBefore
    - bankId
    - direction
    - operationFirstName
    - operationLastName
    - operationMiddleName
    - time
    type: object
  internal_modules_banks_rocketbank_transport_http.UpdateBalanceRequest:
    properties:
      balance:
        example: 99999
        type: number
    required:
    - balance
    type: object
  internal_modules_banks_rocketbank_transport_http.UpdateCardTransferRequest:
    properties:
      amount:
        example: 5000
        type: number
      balanceBefore:
        example: 22096.74
        type: number
      bankId:
        example: tbank
        type: string
      direction:
        enum:
        - OUTGOING
        - INCOMING
        example: OUTGOING
        type: string
      recipientCardNumber:
        example: 1234 5678 9100 0000
        type: string
      time:
        example: 2026-05-16T22:14:12+0700
        type: string
    type: object
  internal_modules_banks_rocketbank_transport_http.UpdateCashTransferRequest:
    properties:
      amount:
        example: 8000
        type: number
      balanceBefore:
        example: 22096.74
        type: number
      direction:
        enum:
        - OUTGOING
        - INCOMING
        example: OUTGOING
        type: string
      time:
        example: 2026-05-02T11:08:52+0700
        type: string
    type: object
  internal_modules_banks_rocketbank_transport_http.UpdateClientInfoRequest:
    properties:
      cardNumber:
        example: "40817810000000000000"
        type: string
      firstName:
        example: Иван
        type: string
      lastName:
        example: Иванов
        type: string
      middleName:
        example: Иванович
        type: string
      phoneNumber:
        example: "+79001234567"
        type: string
    required:
    - cardNumber
    - firstName
    - lastName
    - middleName
    - phoneNumber
    type: object
  internal_modules_banks_rocketbank_transport_http.UpdateSBPTransferRequest:
    properties:
      amount:
        example: 50
        type: number
      balanceBefore:
        example: 190
        type: number
      bankId:
        example: tbank
        type: string
      direction:
        enum:
        - OUTGOING
        - INCOMING
        example: OUTGOING
        type: string
      operationFirstName:
        example: Азат
        type: string
      operationLastName:
        example: Гайнутдинов
        type: string
      operationMiddleName:
        example: Аликович
        type: string
      phoneNumber:
        example: "+79099334005"
        type: string
      time:
        example: 2026-05-16T22:14:12+0700
        type: string
    type: object
  internal_modules_smsagent_transport_http.AckMessageRequest:
    properties:
      deviceId:
        example: abc123
        type: string
      errorMessage:
        type: string
      status:
        example: delivered
        type: string
    required:
    - status
    type: object
  internal_modules_smsagent_transport_http.AgentErrorResponse:
    properties:
      error:
        type: string
    type: object
  internal_modules_smsagent_transport_http.MessageResponse:
    properties:
      address:
        type: string
