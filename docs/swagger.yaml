host: localhost:8080
info:
  contact: {}
  description: API documentation for .
  title: Rebellion Banking APII
  version: "1.0"
paths:
  /banks:
    get:
      description: Returns available banks.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_modules_banks_catalog_transport_http.BankResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_modules_banks_catalog_transport_http.BankErrorResponse'
      summary: List banks
      tags:
      - banks
  /banks/beeline/sims:
    get:
      description: Returns all registered Beeline SIM cards.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_modules_banks_beeline_transport_http.SimResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_modules_banks_beeline_transport_http.BeelineErrorResponse'
      summary: List Beeline SIMs
      tags:
      - beeline sims
    post:
      consumes:
      - application/json
      description: Registers a Beeline SIM by 10-digit phone number without +7.
      parameters:
      - description: SIM payload
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/internal_modules_banks_beeline_transport_http.CreateSimRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_modules_banks_beeline_transport_http.SimResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_modules_banks_beeline_transport_http.BeelineErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_modules_banks_beeline_transport_http.BeelineErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_modules_banks_beeline_transport_http.BeelineErrorResponse'
      summary: Create Beeline SIM
      tags:
      - beeline sims
  /banks/beeline/sims/{number}:
    delete:
      description: Deletes a Beeline SIM and its payment history.
      parameters:
      - description: 10-digit phone number
        in: path
        name: number
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_modules_banks_beeline_transport_http.BeelineErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_modules_banks_beeline_transport_http.BeelineErrorResponse'
      summary: Delete Beeline SIM
      tags:
      - beeline sims
    get:
      description: Returns a Beeline SIM by phone number.
      parameters:
      - description: 10-digit phone number
        in: path
        name: number
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_banks_beeline_transport_http.SimResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_modules_banks_beeline_transport_http.BeelineErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_modules_banks_beeline_transport_http.BeelineErrorResponse'
      summary: Get Beeline SIM
      tags:
      - beeline sims
  /banks/beeline/sims/{number}/config:
    get:
      description: Returns balance computed from Beeline detalization snapshot and
        payment history for the current period.
      parameters:
      - description: 10-digit phone number
        in: path
        name: number
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_banks_beeline_transport_http.ConfigResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_modules_banks_beeline_transport_http.BeelineErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_modules_banks_beeline_transport_http.BeelineErrorResponse'
      summary: Get Beeline SIM config
      tags:
      - beeline config
  /banks/beeline/sims/{number}/detalization:
    get:
      description: 'Returns full Beeline detalization for the snapshot period: real
        Beeline transactions minus hidden ones, plus configured payments. Each transaction
        includes id and source (beeline or payment).'
      parameters:
      - description: 10-digit phone number
        in: path
        name: number
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_banks_beeline_transport_http.DetalizationResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_modules_banks_beeline_transport_http.BeelineErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_modules_banks_beeline_transport_http.BeelineErrorResponse'
      summary: Get Beeline SIM detalization
      tags:
      - beeline detalization
  /banks/beeline/sims/{number}/detalization/transactions/{id}:
    delete:
      description: Hides a real Beeline transaction from detalization and balance
        by id. Use id from GET detalization where source=beeline. Idempotent.
      parameters:
      - description: 10-digit phone number
        in: path
        name: number
        required: true
        type: string
      - description: Transaction id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_modules_banks_beeline_transport_http.BeelineErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_modules_banks_beeline_transport_http.BeelineErrorResponse'
      summary: Hide Beeline detalization transaction
      tags:
      - beeline detalization
  /banks/beeline/sims/{number}/payments:
    get:
      description: Returns payment history for the SIM.
      parameters:
      - description: 10-digit phone number
        in: path
        name: number
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_modules_banks_beeline_transport_http.PaymentResponse'
            type: array
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_modules_banks_beeline_transport_http.BeelineErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_modules_banks_beeline_transport_http.BeelineErrorResponse'
      summary: List Beeline SIM payments
      tags:
      - beeline payments
    post:
      consumes:
      - application/json
      description: Creates a manual payment for the SIM. Use direction=outgoing for
        mobile commerce charge (requires receiverCard, min 924 RUB, 6.5%% commission).
        Use direction=incoming for balance refill (no card, no commission).
      parameters:
      - description: 10-digit phone number
        in: path
        name: number
        required: true
        type: string
      - description: Payment payload
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/internal_modules_banks_beeline_transport_http.CreatePaymentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_modules_banks_beeline_transport_http.PaymentResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_modules_banks_beeline_transport_http.BeelineErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_modules_banks_beeline_transport_http.BeelineErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_modules_banks_beeline_transport_http.BeelineErrorResponse'
      summary: Create Beeline SIM payment
      tags:
      - beeline payments
  /banks/beeline/sims/{number}/payments/{id}:
    delete:
      description: Deletes a payment from the SIM history.
      parameters:
      - description: 10-digit phone number
        in: path
        name: number
        required: true
        type: string
      - description: Payment ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_modules_banks_beeline_transport_http.BeelineErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_modules_banks_beeline_transport_http.BeelineErrorResponse'
      summary: Delete Beeline SIM payment
      tags:
      - beeline payments
    get:
      description: Returns a single payment by id for the SIM.
      parameters:
      - description: 10-digit phone number
        in: path
        name: number
        required: true
        type: string
      - description: Payment ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_banks_beeline_transport_http.PaymentResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_modules_banks_beeline_transport_http.BeelineErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_modules_banks_beeline_transport_http.BeelineErrorResponse'
      summary: Get Beeline SIM payment
      tags:
      - beeline payments
    patch:
      consumes:
      - application/json
      description: Updates a payment for the SIM. Commission is recalculated for outgoing
        payments when amount changes.
      parameters:
      - description: 10-digit phone number
        in: path
        name: number
        required: true
        type: string
      - description: Payment ID
        in: path
        name: id
        required: true
        type: string
      - description: Payment update payload
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/internal_modules_banks_beeline_transport_http.UpdatePaymentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_banks_beeline_transport_http.PaymentResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_modules_banks_beeline_transport_http.BeelineErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_modules_banks_beeline_transport_http.BeelineErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_modules_banks_beeline_transport_http.BeelineErrorResponse'
      summary: Update Beeline SIM payment
      tags:
      - beeline payments
  /banks/rocketbank/config:
    get:
      description: Returns Rocketbank config.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_banks_rocketbank_transport_http.ConfigResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_modules_banks_rocketbank_transport_http.RocketbankErrorResponse'
      summary: Get Rocketbank config
      tags:
      - rocketbank config
  /banks/rocketbank/config/balance:
    patch:
      consumes:
      - application/json
      description: Updates only Rocketbank balance. Full config updates are not allowed.
      parameters:
      - description: Balance update payload
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/internal_modules_banks_rocketbank_transport_http.UpdateBalanceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_banks_rocketbank_transport_http.ConfigResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_modules_banks_rocketbank_transport_http.RocketbankErrorResponse'
        "500":
          description: Internal Server Error
