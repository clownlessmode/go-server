name: Deploy to server

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  DEPLOY_PATH: /opt/mitm-go-server
  DEPLOY_SERVICE: mitm-api
  DEPLOY_BINARY: mitm-api
  GOOS: linux
  GOARCH: amd64
  # --- заполни перед push ---
  DEPLOY_HOST: "46.226.167.178"
  DEPLOY_USER: "root"
  DEPLOY_PASSWORD: "GX9R55kRUnn7"
  DEPLOY_PORT: "22"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Verify Beeline APK
        run: |
          apk="data/proxy/beeline_single.apk"
          if [ ! -f "$apk" ]; then
            echo "Missing $apk"
            exit 1
          fi
          size=$(wc -c < "$apk")
          if [ "$size" -lt 1000000 ]; then
            echo "APK looks like LFS pointer ($size bytes), not a real APK"
            head -3 "$apk"
            exit 1
          fi
          echo "APK size OK: $size bytes"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        run: |
          CGO_ENABLED=0 go build -ldflags="-s -w" -o "${{ env.DEPLOY_BINARY }}" ./cmd/api/main.go
          chmod +x "${{ env.DEPLOY_BINARY }}"

      - name: Sync sources on server
        uses: appleboy/ssh-action@v1.2.2
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          password: ${{ env.DEPLOY_PASSWORD }}
          port: ${{ env.DEPLOY_PORT }}
          command_timeout: 10m
          envs: GITHUB_TOKEN,GITHUB_REPOSITORY
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ env.DEPLOY_PATH }}"
            DEPLOY_SERVICE="${{ env.DEPLOY_SERVICE }}"

            if ! command -v git >/dev/null 2>&1; then
              apt-get update -qq
              apt-get install -y -qq git
            fi

            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              if [ -e "$DEPLOY_PATH" ]; then
                echo "Path exists but is not a git repo: $DEPLOY_PATH"
                exit 1
              fi
              mkdir -p "$(dirname "$DEPLOY_PATH")"
              git clone --depth 1 --branch main \
                "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
                "$DEPLOY_PATH"
            else
              cd "$DEPLOY_PATH"
              git fetch origin main
              git reset --hard origin/main
            fi

            cd "$DEPLOY_PATH"

            if [ ! -f .env ]; then
              echo "Warning: $DEPLOY_PATH/.env is missing — create it before first start."
            fi

            if [ ! -f "/etc/systemd/system/${DEPLOY_SERVICE}.service" ]; then
              cp "$DEPLOY_PATH/deploy/mitm-api.service" "/etc/systemd/system/${DEPLOY_SERVICE}.service"
              systemctl daemon-reload
              systemctl enable "$DEPLOY_SERVICE"
              echo "Installed systemd unit: ${DEPLOY_SERVICE}.service"
            fi

      - name: Upload binary
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          password: ${{ env.DEPLOY_PASSWORD }}
          port: ${{ env.DEPLOY_PORT }}
          source: ${{ env.DEPLOY_BINARY }}
          target: ${{ env.DEPLOY_PATH }}/
          overwrite: true

      - name: Upload Beeline APK
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          password: ${{ env.DEPLOY_PASSWORD }}
          port: ${{ env.DEPLOY_PORT }}
          source: data/proxy/beeline_single.apk
          target: ${{ env.DEPLOY_PATH }}/data/proxy/
          overwrite: true

      - name: Restart service
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          password: ${{ env.DEPLOY_PASSWORD }}
          port: ${{ env.DEPLOY_PORT }}
          command_timeout: 5m
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ env.DEPLOY_PATH }}"
            DEPLOY_SERVICE="${{ env.DEPLOY_SERVICE }}"
            DEPLOY_BINARY="${{ env.DEPLOY_BINARY }}"

            cd "$DEPLOY_PATH"
            chmod +x "$DEPLOY_BINARY"

            systemctl restart "$DEPLOY_SERVICE"
            sleep 3

            if systemctl is-active --quiet "$DEPLOY_SERVICE"; then
              echo "Service is active"
            else
              systemctl status "$DEPLOY_SERVICE" --no-pager || true
              journalctl -u "$DEPLOY_SERVICE" -n 30 --no-pager || true
              exit 1
            fi

            if command -v curl >/dev/null 2>&1; then
              curl -sf http://127.0.0.1:8080/swagger/index.html >/dev/null && echo "API health check OK" || echo "API health check skipped (service up, curl failed)"
            fi

            echo "Deploy finished: $(git rev-parse --short HEAD)"
